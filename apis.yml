name: Amazon Certificate Manager
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
specificationVersion: '0.19'
description: >-
  AWS Certificate Manager (ACM) handles the complexity of creating, storing,
  and renewing public and private SSL/TLS X.509 certificates and keys that
  protect your AWS websites and applications, enabling you to manage
  certificate lifecycles centrally.
created: '2024-01-15'
modified: '2026-03-16'
apis:
  - name: Amazon Certificate Manager API
    description: >-
      API for provisioning, managing, and deploying public and private SSL/TLS
      certificates for use with AWS services and your internal connected
      resources. Supports requesting certificates, describing certificate
      details, listing certificates, importing third-party certificates,
      and managing certificate tags.
    image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
