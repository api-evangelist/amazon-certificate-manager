apis:
- name: Amazon Certificate Manager API
  description: >-
    API for provisioning, managing, and deploying public and private SSL/TLS
    certificates for use with AWS services and your internal connected
    resources. Supports requesting certificates, describing certificate
    details, listing certificates, importing third-party certificates,
    and managing certificate tags.
