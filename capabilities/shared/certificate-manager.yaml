naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Certificate Manager"
  description: "AWS Certificate Manager API for provisioning, managing, and deploying SSL/TLS certificates for use with AWS services."
  tags:
    - Amazon Web Services
    - Certificates
    - SSL
    - TLS
    - Security
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: acm
      baseUri: https://acm.us-east-1.amazonaws.com
      description: "AWS Certificate Manager API for managing SSL/TLS certificates."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: certificates
          path: /certificates
          description: "SSL/TLS certificate resources"
          operations:
            - name: list-certificates
              method: GET
              description: "Retrieves a list of certificate ARNs and domain names"
              inputParameters:
                - name: maxItems
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of certificates to return"
                - name: nextToken
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
                - name: certificateStatuses
                  in: query
                  type: array
                  required: false
                  description: "Filter by certificate status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: certificate
          path: /certificates/{certificateArn}
          description: "Individual SSL/TLS certificate resource"
          operations:
            - name: describe-certificate
              method: GET
              description: "Returns detailed metadata about the specified ACM certificate"
              inputParameters:
                - name: certificateArn
                  in: path
                  type: string
                  required: true
                  description: "The ARN of the ACM certificate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-certificate
              method: DELETE
              description: "Deletes a certificate and its associated private key"
              inputParameters:
                - name: certificateArn
                  in: path
                  type: string
                  required: true
                  description: "The ARN of the ACM certificate to delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: request-certificate
          path: /
          description: "Certificate request resource"
          operations:
            - name: request-certificate
              method: POST
              description: "Requests an ACM certificate for use with other AWS services"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  DomainName: "{{tools.domain_name}}"
                  ValidationMethod: "{{tools.validation_method}}"

  exposes:
    - type: rest
      port: 8100
      namespace: acm-rest
      resources:
        - path: /v1/certificates
          name: certificates
          description: "List and request SSL/TLS certificates"
          operations:
            - method: GET
              name: list-certificates
              description: "List all ACM certificates"
              call: "acm.list-certificates"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: request-certificate
              description: "Request a new ACM certificate"
              call: "acm.request-certificate"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/certificates/{certificateArn}
          name: certificate
          description: "Get or delete a specific ACM certificate"
          operations:
            - method: GET
              name: describe-certificate
              description: "Describe a specific ACM certificate"
              call: "acm.describe-certificate"
              with:
                certificateArn: "rest.certificateArn"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-certificate
              description: "Delete a specific ACM certificate"
              call: "acm.delete-certificate"
              with:
                certificateArn: "rest.certificateArn"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: acm-mcp
      transport: http
      tools:
        - name: list-certificates
          description: "List all ACM SSL/TLS certificates with optional status filter"
          hints:
            readOnly: true
            idempotent: true
          call: "acm.list-certificates"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-certificate
          description: "Get detailed metadata about a specific ACM certificate by ARN"
          hints:
            readOnly: true
            idempotent: true
          call: "acm.describe-certificate"
          with:
            certificateArn: "tools.certificate_arn"
          outputParameters:
            - type: object
              mapping: "$."

        - name: request-certificate
          description: "Request a new ACM SSL/TLS certificate with DNS or email validation"
          hints:
            readOnly: false
            idempotent: false
          call: "acm.request-certificate"
          with:
            DomainName: "tools.domain_name"
            ValidationMethod: "tools.validation_method"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-certificate
          description: "Delete an ACM certificate by ARN"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "acm.delete-certificate"
          with:
            certificateArn: "tools.certificate_arn"
          outputParameters:
            - type: object
              mapping: "$."
